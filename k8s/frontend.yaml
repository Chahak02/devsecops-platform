apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-frontend
  labels:
    app: devsecops-frontend
    tenant: devsecops-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-frontend
  template:
    metadata:
      labels:
        app: devsecops-frontend
        tenant: devsecops-platform
    spec:
      containers:
      - name: frontend
        image: chahak02/devsecops-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  selector:
    app: devsecops-frontend
  ports:
  - port: 80
    targetPort: 80
