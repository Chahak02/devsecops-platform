apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-backend
  labels:
    app: devsecops-backend
    tenant: devsecops-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devsecops-backend

  template:
    metadata:
      labels:
        app: devsecops-backend
        tenant: devsecops-platform

    spec:
      containers:
      - name: backend
        image: chahak02/devsecops-backend:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: devsecops-backend
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30082
