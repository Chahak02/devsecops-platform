apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-backend
  template:
    metadata:
      labels:
        app: devsecops-backend
    spec:
      containers:
      - name: backend
        image: __DOCKER_USER__/devsecops-backend:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP
  selector:
    app: devsecops-backend
  ports:
  - port: 5000
    targetPort: 5000
